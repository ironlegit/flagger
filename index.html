<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #0f0c29;
        color: #fff;
        margin: 0;
        padding: 20px;
      }
      #flags-container {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .flag-card {
        background: rgba(20, 20, 40, 0.8);
        border-radius: 8px;
        padding: 10px;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid rgba(100, 100, 200, 0.3);
      }

      .flag-card:hover {
        box-shadow: 0 0 10px rgba(100, 100, 255, 0.5);
        border-color: rgba(100, 100, 255, 0.7);
      }

      .flag-card img {
        width: 100%;
        height: auto;
        border-radius: 4px;
        margin-bottom: 8px;
      }

      .flag-card p {
        margin: 0;
        font-size: 12px;
        text-align: center;
      }

      .letter-header {
        background: rgba(100, 100, 200, 0.5);
        font-size: 40px;
        font-weight: bold;
        border-radius: 8px;
        padding: 10px;
        text-shadow: 0 0 5px rgba(0, 100, 255, 0.7);
      }
    </style>
  </head>
  <body>
    <h1>Flagger</h1>
    <h2>Flag Overview</h2>
    <div id="flags-container"></div>
    <div id="letters-container"></div>
  </body>
  <script>
    let url = "https://restcountries.com/v3.1/all?fields=cca3,name,flags";
    fetch(url)
      .then((response) => response.json())
      .then((data) => {
        // Sort countries alphabetically
        data.sort((a, b) => a.name.common.localeCompare(b.name.common));
        const container = document.getElementById("flags-container");

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        alphabet.forEach((letter) => {
          // Filter countries starting with current letter
          const countriesByLetter = data.filter((country) => {
            // Decompose characters like "Å" into "A" + diacritical mark
            const firstChar = country.name.common
              .normalize("NFD")
              .charAt(0)
              .toUpperCase();
            return firstChar === letter;
          });

          if (countriesByLetter.length > 0) {
            const letterCard = document.createElement("div");

            // Use same class for letters and flag
            letterCard.className = "flag-card letter-header";
            letterCard.textContent = letter;
            container.appendChild(letterCard);

            countriesByLetter.forEach((country) => {
              // Create a container for each flag + name
              const flagCard = document.createElement("div");
              flagCard.className = "flag-card"; // For styling

              // Create the flag image
              const img = document.createElement("img");
              img.src = country.flags.png;
              img.alt = `Flag of ${country.name.common}`;

              // Create the country name
              const name = document.createElement("p");
              name.textContent = country.name.common;

              // Append both to the card
              flagCard.appendChild(img);
              flagCard.appendChild(name);

              // Append the card to the main container
              container.appendChild(flagCard);
            });
          }
        });
      });
  </script>
</html>
