<!doctype html>
<html>
  <head>
    <title>Flagger - Flag Explorer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="header">
      <h1 class="flag-header" id="cyber-header" data-text="Flagger"></h1>
      <p class="flag-sub">// Flag Explorer</p>
    </div>
    <div class="filters">
      <span class="filter-label">Filters</span>
      <button id="toggle-names">Hide Names</button>
      <button id="toggle-mode">Overview Mode</button>
      <input
        id="search-bar"
        type="text"
        id="search"
        placeholder="Filter by keyword..."
      />
    </div>
    <div id="flags-container"></div>
    <div id="letters-container"></div>
    <div class="footer">
      <span class="footer">Powered by Robo [【•】◡【•】]</span>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
